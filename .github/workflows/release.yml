name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger build on tags like v1.0.0, v2.1.0

permissions:
  contents: write

jobs:
  build:
    name: Build Standalone Executables
    runs-on: ${{ matrix.os }}
    # GitHub Actions solo provee máquinas virtuales para Ubuntu, Windows y macOS.
    # Usamos una estrategia matricial explícita con CPU y GPU por separado.
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            device: cpu
            artifact_name: rbot-linux-cpu
            binary_name: rbot
            release_name: rbot-linux-cpu
            pkg_suffix: -cpu
          - os: ubuntu-latest
            device: gpu
            artifact_name: rbot-linux-gpu
            binary_name: rbot
            release_name: rbot-linux-gpu
            pkg_suffix: -gpu
          - os: windows-latest
            device: cpu
            artifact_name: rbot-windows-cpu
            binary_name: rbot.exe
            release_name: rbot-windows-cpu.exe
            pkg_suffix: -cpu
          - os: windows-latest
            device: gpu
            artifact_name: rbot-windows-gpu
            binary_name: rbot.exe
            release_name: rbot-windows-gpu.exe
            pkg_suffix: -gpu
          - os: macos-latest
            device: cpu
            artifact_name: rbot-macos
            binary_name: rbot
            release_name: rbot-macos
            pkg_suffix: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free up disk space (Linux GPU Build)
        if: matrix.os == 'ubuntu-latest' && matrix.device == 'gpu'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y alien fakeroot portaudio19-dev

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install portaudio

      - name: Install Dependencies (Linux/Windows CPU PyTorch)
        if: matrix.os != 'macos-latest' && matrix.device == 'cpu'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          # Install CPU-only version of PyTorch to keep binary size under ~300MB (instead of 2GB+)
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install .

      - name: Install Dependencies (Linux/Windows GPU PyTorch)
        if: matrix.os != 'macos-latest' && matrix.device == 'gpu'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          # Install standard/GPU-enabled version of PyTorch
          pip install .

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          pip install .

      - name: Build Executable
        env:
          RBOT_PKG_SUFFIX: ${{ matrix.pkg_suffix }}
        run: |
          python scripts/package.py

      - name: Rename Artifact
        shell: bash
        run: |
          mv dist/${{ matrix.binary_name }} dist/${{ matrix.release_name }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux CPU Build
        uses: actions/download-artifact@v4
        with:
          name: rbot-linux-cpu
          path: ./dist

      - name: Download Linux GPU Build
        uses: actions/download-artifact@v4
        with:
          name: rbot-linux-gpu
          path: ./dist

      - name: Download Windows CPU Build
        uses: actions/download-artifact@v4
        with:
          name: rbot-windows-cpu
          path: ./dist

      - name: Download Windows GPU Build
        uses: actions/download-artifact@v4
        with:
          name: rbot-windows-gpu
          path: ./dist

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: rbot-macos
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/rbot-linux*.tar.gz
            ./dist/rbot-windows*.zip
            ./dist/rbot-macos*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
